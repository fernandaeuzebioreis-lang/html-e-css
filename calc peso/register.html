<!DOCTYPE html> 

<html lang="en"> 

<head> 

    <meta charset="UTF-8"> 

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet"> 

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script> 

    <title>Document</title> 

</head> 

<body> 

<div class="container text-center" style="margin-top: 100px;"> 

    <div class="row justify-content-md-center" style="padding-top: 50px;"> 

        <h1 style="font-family: Verdana, Geneva, Tahoma, sans-serif;">Registre-se</h1> 

    </div> 

    <div class="row justify-content-md-center" style="margin-top: 70px;"> 

        <div class="col"> 

            <img src="img/comida.png"style="width: 350px;"> 

        </div> 

        <form id = "form">  

        <div class="col" style="padding-right: 300px;"> 

            <div class="mb-3" style="text-align: left;"> 

                <label for="email" class="form-label">Email</label> 

                <input required id="email" class="form-control form-control-lg" type="email" placeholder="Seu email" aria-label=".form-control-lg example"> 

            </div> 

            <div class="mb-3" style="text-align: left;"> 

                <label for="senha" class="form-label">Senha</label> 

                <input required id="senha" class="form-control form-control-lg" type="password" placeholder="Sua senha" aria-label=".form-control-lg example"> 

            </div> 

            <div class="mb-3" style="text-align: left;"> 

                <label for="resenha" class="form-label">Repetir senha</label> 

                <input required id="resenha" class="form-control form-control-lg" type="password" placeholder="Repetir sua senha" aria-label=".form-control-lg example"> 

            </div> 

            <div class="mb-3" style="margin-top: 35px;"> 

                <div class="container text-center"> 

                    <div class="row"> 

                        <div class="col"> 

                        <button type="button" id = 'btnOk' class="btn btn-success btn-lg">Confirmar</button> 

                        </div> 

                    <div class="col"> 

                        <button type="button" class="btn btn-danger btn-lg">Limpar</button> 

                    </div> 

                </div> 

            </div> 

        </div> 
        

       </form> 

    </div> 

</div> 

</body> 

</html>
