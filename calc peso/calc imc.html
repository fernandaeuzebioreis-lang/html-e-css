<!DOCTYPE html> 

<html lang="pt-BR"> 

    <head> 

        <meta charset="UTF-8"> 

        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"> 

        <title>Calculadora IMC</title> 

        <link rel="stylesheet" href="css/bootstrap/css/bootstrap.css"> 

    </head> 

    <body> 

        <div class="container d-flex align-items-center justify-content-center" id="corpo" style="min-height: 100vh;"> 

            <div class="w-100 py-4"> 

                <div class="row justify-content-center mb-4 text-center" id="titulo"> 

                    <div class="col-md-auto"> 

                        <h1 id="titulo-texto">Calculadora IMC</h1> 

                    </div> 

                </div> 

                <div class="row justify-content-center align-items-center"> 

                    <div class="col-lg-5 col-md-6 text-center mb-4 mb-lg-0" id="imagens"> 

                        <img id="imagens-conteudo" class="img-fluid" style="width:100%;" src="imagens/img1.png" alt="Ilustração da calculadora IMC"> 

                    </div> 

                    <div class="col-lg-4 col-md-6 d-flex align-items-center justify-content-center" id="formularios"> 

                        <form id="form" class="w-100" autocomplete="on"> 

                            <div class="mb-3"> 

                                <h3 id="login">Login</h3> 

                            </div> 

                            <div class="input-group mb-3"> 

                                <input id="email" name="email" type="email" placeholder="E-mail" class="form-control"> 

                            </div> 

                            <div class="input-group mb-3"> 

                                <input id="senha" name="senha" type="password" placeholder="Senha" class="form-control"> 

                            </div> 

                            <div class="mb-3"> 

                                <button id="entra" name="entra" type="button" class="btn btn-outline-primary btn-lg btn-block">Entrar</button> 

                            </div> 

                            <div class="mb-3"> 

                                <button id="cadastra" name="cadastra" type="button" class="btn btn-success btn-lg btn-block">Cadastrar</button> 

                            </div> 

                            <div id="erro" class="alert alert-dark invisible mb-0" role="alert"></div> 

                        </form> 

                    </div> 

                </div> 

            </div> 

        </div> 

 

        <script src="js/db.js"></script> 

        <script src="js/auth.js"></script> 

         

    </body> 

</html>
