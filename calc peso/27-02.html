<!DOCTYPE html>  

<html lang="pt-br">  

<head>  

<meta charset="UTF-8">  

<meta name="viewport" content="width=device-width, initial-scale=1.0">  

<link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">  

<script src="bootstrap/js/bootstrap.bundle.min.js"></script>  

<title>Formulário</title>  

</head>  

<body class="d-flex justify-content-center align-items-center vh-80">  

<div class="container text-center">  

<div class="row justify-content-center">  

<div class="col-md-6">  

<h1 style="font-family: Verdana, Geneva, Tahoma, sans-serif;">Formulário</h1>  

<form>  

 

 <div class="mb-3 text-start">  

  <label for="user" class="form-label">Nome</label>  

  <input type="text" class="form-control form-control-lg" id="user" placeholder="Digite seu nome">  

  </div>  

   <div class="mb-3 text-start">  

<label for="apeticao" class="form-label">Última Refeição</label>  

<input type="text" class="form-control form-control-lg" id="apeticao" placeholder="Quanto foi a Última Refeição">  

</div>  

   <div class="mb-3 text-start">  

   <label for="idade" class="form-label">Idade</label>  

   <input type="number" class="form-control form-control-lg" id="idade" placeholder="Digite sua idade">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="date" class="form-label">Data</label>  

   <input type="date" class="form-control form-control-lg" id="date">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="kg" class="form-label">Massa</label>  

   <input type="number" class="form-control form-control-lg" id="kg" placeholder="Digite seu peso">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="height" class="form-label">Altura</label>  

   <input type="number" class="form-control form-control-lg" id="height" placeholder="Digite sua altura">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="ca" class="form-label">Circunferência abdominal</label>  

   <input type="number" class="form-control form-control-lg" id="ca" placeholder="Digite a Circunferência abdominal em Centimetros">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="photo" class="form-label">Foto</label>  

   <input type="file" class="form-control form-control-lg" id="photo">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="calc" class="form-label">Calculadora</label>  

   <input type="number" class="form-control form-control-lg" id="calc" placeholder="Calcula">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="imc" class="form-label">IMC</label>  

   <input type="number" class="form-control form-control-lg" id="imc" placeholder="Calcula">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="status" class="form-label">Status</label>  

   <input type="text" class="form-control form-control-lg" id="status" placeholder="Digite seu status">  

   </div>  

   <div class="col"> 

  <img src="imc/pessoas.jpg"style="width: 350px;"> 

  </div> 

   <div class="d-flex justify-content-around mt-4">  

<button type="submit" class="btn btn-success btn-lg">Salvar</button>  

<button type="reset" class="btn btn-danger btn-lg">Limpar</button>  

</div>  

</form>  

</div>  

</div>  

</div>  

  </body>   

  </html>
