Cadastro de pets em html 

 

<!DOCTYPE html> 

<html lang="en"> 

<head> 

    <meta charset="UTF-8"> 

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet"> 

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script> 

    <title>Document</title> 

</head> 

<body> 

<div class="container text-center" style="margin-top: 100px;"> 

    <div class="row justify-content-md-center" style="padding-top: 50px;"> 

        <h1 style="font-family: Verdana, Geneva, Tahoma, sans-serif;">Cadastro de pets</h1> 

    </div> 

    <div class="row justify-content-md-center" style="margin-top: 70px;"> 

        <div class="col"> 

            <img src="img/pets.jpg"style="width: 350px;"> 

        </div> 

         

        <div class="mb-3 text-start">  

  <label for="user" class="form-label">Nome</label>  

  <input type="text" class="form-control form-control-lg" id="user" placeholder="Digite o nome do seu pet">  

  </div>  

   <div class="mb-3 text-start">  

<label for="apeticao" class="form-label">Qual é a raça do seu pet ?</label>  

<input type="text" class="form-control form-control-lg" id="Digite" placeholder="Qual é raça do seu pet">  

</div>  

   <div class="mb-3 text-start">  

   <label for="idade" class="form-label">Qual a idade do seu pet ?</label>  

   <input type="number" class="form-control form-control-lg" id="Digite" placeholder="Digite a idade do seu pet">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="date" class="form-label">Data</label>  

   <input type="date" class="form-control form-control-lg" id="Data de nascimento">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="kg" class="form-label">Peso</label>  

   <input type="number" class="form-control form-control-lg" id="kg" placeholder="Digite seu peso">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="height" class="form-label">O seu pet já tomou vacina ?</label>  

   <input type="number" class="form-control form-control-lg" id="height" placeholder="Digite">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="ca" class="form-label">O seu pet tem alguma alergia ?</label>  

   <input type="number" class="form-control form-control-lg" id="ca" placeholder="Digite">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="photo" class="form-label">Foto</label>  

   <input type="file" class="form-control form-control-lg" id="photo">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="calc" class="form-label">Sexo</label>  

   <input type="number" class="form-control form-control-lg" id="calc" placeholder="Digite">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="imc" class="form-label">Qual Cor do seu pet ?</label>  

   <input type="number" class="form-control form-control-lg" id="imc" placeholder="Digite">  

   </div>  

   <div class="mb-3 text-start">  

   <label for="status" class="form-label">O seu pet já foi castrado (a) ?</label>  

   <input type="text" class="form-control form-control-lg" id="status" placeholder="Digite">  

   </div>  

   <div class="d-flex justify-content-around mt-4">  

<button type="submit" class="btn btn-success btn-lg">Salvar</button>  

<button type="reset" class="btn btn-danger btn-lg">Limpar</button>  

<button type="submit" class="btn btn-secondary btn-lg">Enviar</button>  

</div>  

</form>  

</div>  

</div>  

</div>  

  </body>   

  </html>
