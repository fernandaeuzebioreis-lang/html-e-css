<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Document</title> 
 <style>
    body{
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background-color: purple;
    }
    #btn1{
        position: fixed;
        left: 50%;
        top: 50%;
        padding: 15px 15px 15px 15px;
        transform: translate(-50%, -50%);
        border:2px solid #000;
        border-radius: 12px;
        background-color: #fff;
        cursor: pointer;
        transition: left 120ms linear, top 120ms linear;
    }

    #btn2{
        position: fixed;
        left: 70%;
        top: 50%;
        padding: 15px 15px 15px 15px;
        transform: translate(-50%, -50%);
        border:2px solid #000;
        border-radius: 12px;
        background-color: #fff;
        cursor: pointer;
        transition: left 120ms linear, top 120ms linear;
    }
   </style>
 </head> 
<body>
    <button id="btn1"> Clique aqui se vc é um sigma</button>
    <button id="btn2"> Clique aqui se vc é um beta</button>
    
    <script>
        let btn1 = document.querySelector("#btn1");
        let btn2= document.querySelector("#btn2");
        let distancia = 80;
        let margem = 16;
        let desloc = true;

        function acao(){
            let rect = btn1.getBoundingClientRect();

            const vl = window.innerWidth;
            const va = window.innerHeight;

            const minX = margem + rect.width / 2;
            const minY = margem + rect.height / 2;
            const maxX = vl - margem - rect.width / 2;
            const maxY = va - margem - rect.height / 2;

            let x = minX + Math.random() * (maxX - minX);
            let y = minY + Math.random() * (maxy - minY);

            btn1.style.left = x + "px";
            btn2.style.top = y + "px";
        }
        document.addEventListener("mousemove", (e) => {
            const rect = btn1.getBoundingClientRect();

            

            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            const dx = e.clientX - cx;
            const dy = e.clientY - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < distancia && desloc){
                desloc = false;
                acao();
                setTimeout(() => (desloc = true), 120);
            }
        });
    </script>
</body>
</html>

<button id="botao">Clique aqui</button>

<script>
document.getElementById("botao").addEventListener("click", function() {
  alert("Botão foi clicado!");
});
</script>
