 

<!DOCTYPE html> 

<html lang="pt-BR"> 

<head> 

  <meta charset="UTF-8" /> 

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 

  <title>Teste de usuarios</title> 

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/> 

  <style> 

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } 

 

    :root { 

      --bg: #f5f3ef; 

      --card: #ffffff; 

      --ink: #1a1714; 

      --muted: #6b6560; 

      --accent: #2d5be3; 

      --accent-hover: #1a3fad; 

      --border: #ddd9d4; 

      --radius: 10px; 

      --shadow: 0 2px 16px rgba(0,0,0,0.07); 

    } 

 

    body { 

      font-family: 'DM Sans', sans-serif; 

      background: var(--bg); 

      min-height: 100vh; 

      display: flex; 

      align-items: center; 

      justify-content: center; 

      padding: 40px 16px; 

    } 

 

    .page { 

      width: 100%; 

      max-width: 480px; 

      display: flex; 

      flex-direction: column; 

      gap: 24px; 

    } 

 

    .card { 

      background: var(--card); 

      border: 1px solid var(--border); 

      border-radius: var(--radius); 

      padding: 32px 28px; 

      box-shadow: var(--shadow); 

    } 

 

    .card h2 { 

      font-family: 'DM Serif Display', serif; 

      font-size: 1.15rem; 

      color: var(--ink); 

      margin-bottom: 20px; 

      letter-spacing: -0.01em; 

    } 

 

    .form-group { 

      display: flex; 

      flex-direction: column; 

      gap: 4px; 

      margin-bottom: 14px; 

    } 

 

    label { 

      font-size: 0.78rem; 

      font-weight: 500; 

      color: var(--muted); 

      text-transform: uppercase; 

      letter-spacing: 0.06em; 

    } 

 

    input { 

      width: 100%; 

      padding: 9px 12px; 

      border: 1px solid var(--border); 

      border-radius: 6px; 

      font-family: 'DM Sans', sans-serif; 

      font-size: 0.9rem; 

      color: var(--ink); 

      background: #fafaf8; 

      transition: border-color 0.18s, box-shadow 0.18s; 

      outline: none; 

    } 

 

    input:focus { 

      border-color: var(--accent); 

      box-shadow: 0 0 0 3px rgba(45, 91, 227, 0.12); 

      background: #fff; 

    } 

 

    .btn { 

      display: block; 

      width: 100%; 

      margin-top: 18px; 

      padding: 11px; 

      background: var(--accent); 

      color: #fff; 

      border: none; 

      border-radius: 7px; 

      font-family: 'DM Sans', sans-serif; 

      font-size: 0.88rem; 

      font-weight: 600; 

      letter-spacing: 0.02em; 

      cursor: pointer; 

      transition: background 0.18s, transform 0.1s; 

    } 

 

    .btn:hover { background: var(--accent-hover); } 

    .btn:active { transform: scale(0.98); } 

 

    .btn-outline { 

      background: transparent; 

      color: var(--accent); 

      border: 1.5px solid var(--accent); 

    } 

    .btn-outline:hover { background: rgba(45,91,227,0.06); } 

 

    textarea { 

      width: 100%; 

      padding: 10px 12px; 

      border: 1px solid var(--border); 

      border-radius: 6px; 

      font-family: 'DM Sans', sans-serif; 

      font-size: 0.88rem; 

      color: var(--ink); 

      background: #fafaf8; 

      resize: vertical; 

      outline: none; 

      transition: border-color 0.18s, box-shadow 0.18s; 

      line-height: 1.5; 

    } 

 

    textarea:focus { 

      border-color: var(--accent); 

      box-shadow: 0 0 0 3px rgba(45, 91, 227, 0.12); 

      background: #fff; 

    } 

 

    .resultado-box { 

      margin-top: 16px; 

      background: #f0f4ff; 

      border: 1px solid #c5d3f7; 

      border-radius: 7px; 

      padding: 12px 14px; 

      font-size: 0.85rem; 

      color: var(--muted); 

      min-height: 60px; 

      white-space: pre-wrap; 

      font-family: 'DM Sans', sans-serif; 

      line-height: 1.6; 

    } 

 

    .resultado-label { 

      font-size: 0.75rem; 

      font-weight: 500; 

      color: var(--muted); 

      text-transform: uppercase; 

      letter-spacing: 0.06em; 

      margin-top: 16px; 

      margin-bottom: 6px; 

      display: block; 

    } 

  </style> 

</head> 

<body> 

  <div class="page"> 

 

    <!-- Cadastrar Usuarios --> 

    <div class="card"> 

      <h2>Cadastrar Usuarios</h2> 

      <div class="form-group"> 

        <label for="nome">Nome</label> 

        <input type="text" id="nome" /> 

      </div> 

      <div class="form-group"> 

        <label for="email">E-mail</label> 

        <input type="email" id="email" /> 

      </div> 

      <div class="form-group"> 

        <label for="contato">Contato</label> 

        <input type="text" id="contato" /> 

      </div> 

      <div class="form-group"> 

        <label for="cargo">Cargo</label> 

        <input type="text" id="cargo" /> 

      </div> 

      <button class="btn">Cadastrar</button> 

    </div> 

 

    <!-- Buscar por ID --> 

    <div class="card"> 

      <h2>Buscar usuário por ID</h2> 

      <div class="form-group"> 

        <label for="id-usuario">ID do usuário</label> 

        <input type="text" id="id-usuario"/> 

      </div> 

      <button class="btn">Buscar por ID</button> 

    </div> 

 

    <!-- Listar Usuarios --> 

    <div class="card"> 

      <h2>Listar usuarios</h2> 

      <div class="form-group"> 

        <label for="digitar-resultado">Digite aqui</label> 

        <textarea id="digitar-resultado" rows="4"></textarea> 

      </div> 

      <button class="btn">Listar usuarios</button>  

      <span class="resultado-label">Resultado</span> 

      <div class="resultado-box" id="resultado"> 

    </div> 

 

  </div> 

  <script> 

    function mostrarResultado() { 

      const texto = document.getElementById('digitar-resultado').value.trim(); 

      const box = document.getElementById('resultado'); 

      box.textContent = texto !== '' ? texto : 'Nenhum resultado ainda.'; 

    } 

  </script> 

</body> 

</html>
