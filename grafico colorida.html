<!DOCTYPE html> 

<html lang="pt-BR"> 

<head> 

    <meta charset="UTF-8"> 

    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"> 

    <title>Gráfico Doughnut</title> 

    <!-- Importando Chart.js --> 

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 

</head> 

<body> 

    <!-- Área do gráfico --> 

    <canvas id="grafico"></canvas> 

 

    <script> 

        const ctx = document.getElementById("grafico"); 

 

        const data = { 

            labels: ['Red', 'Orange', 'Yellow', 'Green', 'Blue'], 

            datasets: [{ 

                label: 'Categorias', 

                data: [10, 20, 30, 25, 15], 

                backgroundColor: [ 

                    'rgb(255, 99, 132)',   // vermelho 

                    'rgb(255, 159, 64)',   // laranja 

                    'rgb(255, 205, 86)',   // amarelo 

                    'rgb(75, 192, 192)',   // verde/teal 

                    'rgb(54, 162, 235)'    // azul 

                ] 

            }] 

        }; 

 

        const config = { 

            type: 'doughnut', 

            data: data, 

            options: { 

                responsive: true, 

                plugins: { 

                    legend: { 

                        position: 'top', 

                    }, 

                    title: { 

                        display: true, 

                        text: 'Chart.js Doughnut Chart' 

                    } 

                } 

            } 

        }; 

 

        new Chart(ctx, config); 

    </script> 

</body> 

</html>
